name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: false  # Отключаем кэш чтоб не подтягивать app_links

      - name: Clean pub cache
        run: |
          rm -rf ~/.pub-cache
          flutter pub cache repair

      - name: Fix pubspec.yaml
        run: |
          # Удаляем ВСЁ лишнее
          sed -i '/flutter_dotenv/d' pubspec.yaml
          sed -i '/file_picker/d' pubspec.yaml
          sed -i '/url_launcher/d' pubspec.yaml
          sed -i '/flutter_local_notifications/d' pubspec.yaml
          sed -i '/sqlite3_flutter_libs/d' pubspec.yaml
          sed -i '/app_links/d' pubspec.yaml
          
          echo "=== pubspec.yaml ==="
          cat pubspec.yaml

      - name: Get dependencies
        run: flutter pub get

      - name: Fix android/build.gradle
        run: |
          cat > android/build.gradle << 'EOF'
          buildscript {
              ext.kotlin_version = '1.9.0'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.3.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          
          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(':app')
          }
          
          tasks.register('clean', Delete) {
              delete rootProject.buildDir
          }
          EOF

      - name: Fix android/app/build.gradle
        run: |
          cat > android/app/build.gradle << 'EOF'
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }
          
          def localProperties = new Properties()
          def localPropertiesFile = rootProject.file("local.properties")
          if (localPropertiesFile.exists()) {
              localPropertiesFile.withReader("UTF-8") { reader ->
                  localProperties.load(reader)
              }
          }
          
          def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
          if (flutterVersionCode == null) {
              flutterVersionCode = "1"
          }
          
          def flutterVersionName = localProperties.getProperty("flutter.versionName")
          if (flutterVersionName == null) {
              flutterVersionName = "1.0"
          }
          
          android {
              namespace "com.example.telegraph"
              compileSdk 34
              ndkVersion flutter.ndkVersion
          
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          
              kotlinOptions {
                  jvmTarget = "1.8"
              }
          
              defaultConfig {
                  applicationId "com.example.telegraph"
                  minSdk 21
                  targetSdk 34
                  versionCode flutterVersionCode.toInteger()
                  versionName flutterVersionName
              }
          
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                  }
              }
          }
          
          flutter {
              source "../.."
          }
          
          dependencies {}
          EOF

      - name: Fix gradle wrapper
        run: |
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-7.6.3-all.zip" > android/gradle/wrapper/gradle-wrapper.properties

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: telegraph-apk
          path: build/app/outputs/flutter-apk/app-release.apk
