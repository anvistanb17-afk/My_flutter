name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Fix Gradle compileSdkVersion
        run: |
          cd android
          
          # Обновляем compileSdkVersion в app/build.gradle
          sed -i 's/compileSdkVersion.*/compileSdkVersion 34/' app/build.gradle
          sed -i 's/targetSdkVersion.*/targetSdkVersion 34/' app/build.gradle
          sed -i 's/minSdkVersion.*/minSdkVersion 21/' app/build.gradle
          
          # Если строк нет — добавляем
          if ! grep -q "compileSdkVersion" app/build.gradle; then
            sed -i '/android {/a \ \ \ \ compileSdkVersion 34' app/build.gradle
          fi
          
          cat app/build.gradle
          cd ..

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
