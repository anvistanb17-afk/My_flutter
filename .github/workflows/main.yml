name: Fastlane Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
      
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: true
      
      - name: Install Fastlane with Bundler
        run: |
          bundle config set --local path 'vendor/bundle'
          bundle install
      
      - name: Clean and prepare
        run: |
          flutter clean
          rm -f pubspec.lock
          flutter pub get
      
      - name: Build APK with Fastlane
        working-directory: ./android
        run: bundle exec fastlane build_apk
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            ../build/app/outputs/flutter-apk/app-release.apk
