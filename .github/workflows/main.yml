name: Build Flutter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
    
    - name: Clean project
      run: |
        flutter clean
        rm -f pubspec.lock
        rm -rf .dart_tool
    
    - name: Fix path conflict
      run: |
        # Добавляем dependency_overrides в конец pubspec.yaml
        cat >> pubspec.yaml << 'EOF'

dependency_overrides:
  path: 1.8.3
EOF
        # Показываем файл для отладки
        cat pubspec.yaml
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build APK
      run: flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: build/app/outputs/flutter-apk/app-release.apk
        
