- name: Fix path version conflict
      run: |
        # Добавляем dependency_overrides если их нет
        if ! grep -q "dependency_overrides:" pubspec.yaml; then
          echo "" >> pubspec.yaml
          echo "dependency_overrides:" >> pubspec.yaml
          echo "  path: 1.8.3" >> pubspec.yaml
        fi
    
    - name: Get dependencies
      run: flutter pub get
