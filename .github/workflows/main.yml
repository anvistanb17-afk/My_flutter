name: Build Flutter APK

# Триггеры: при пуше в main и ручной запуск
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Позволяет запускать сборку вручную

jobs:
  build:
    runs-on: ubuntu-latest  # Рекомендованная среда для Android сборок

    steps:
      # 1. Получение кода
      - uses: actions/checkout@v4

      # 2. Установка Java (Одна из главных причин ошибок - неверная версия)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17' # Flutter 3.x требует Java 11 или 17

      # 3. Установка Flutter
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # Рекомендуется 'stable'
          cache: true      # Ускоряет последующие сборки

      # 4. Проверка версий и получение зависимостей
      - name: Flutter version & Pub get
        run: |
          flutter --version
          flutter pub get

      # 5. Сборка APK (релизная версия)
      - name: Build APK
        run: flutter build apk --release

      # 6. Сохранение артефакта для скачивания
      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-release  # Имя файла в архиве
          path: build/app/outputs/flutter-apk/app-release.apk
