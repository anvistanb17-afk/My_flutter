name: Create Flutter Project

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: 'Название проекта'
        required: true
        default: 'my_flutter_app'

jobs:
  create:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Create Flutter project
        run: |
          flutter create ${{ github.event.inputs.project_name }}

      - name: Move files to root
        run: |
          shopt -s dotglob
          mv ${{ github.event.inputs.project_name }}/* .
          mv ${{ github.event.inputs.project_name }}/.gitignore . 2>/dev/null || true
          rm -rf ${{ github.event.inputs.project_name }}

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Create Flutter project: ${{ github.event.inputs.project_name }}" || echo "No changes"
          git push
